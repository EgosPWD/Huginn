version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js 16 App Router
  - ui_library: Tailwind CSS 4
  - other: Geist fonts, Bun runtime
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Single-page app — URL input form and full analysis results
features:
  - name: URL Input Form
    description: Input field and Analyze button for submitting a news article URL
    files:
      - src/app/_components/AnalyzerForm.tsx
    entry_route: /
    user_interactions:
      - See URL input field with placeholder text
      - Type a URL into the input field
      - See Analyze button disabled when input is empty
      - See Analyze button enabled when input has text
      - Click Analyze button to submit
      - See Analyze button show "Analyzing..." and be disabled while loading
    api_calls: []
    auth_required: false

  - name: Loading State
    description: Spinner and status message shown while analysis is running
    files:
      - src/app/_components/AnalyzerForm.tsx
    entry_route: /
    user_interactions:
      - See spinning loader icon appear after submitting
      - See descriptive loading message text
    api_calls: []
    auth_required: false

  - name: Error State
    description: Red error banner shown when URL is invalid or analysis fails
    files:
      - src/app/_components/AnalyzerForm.tsx
    entry_route: /
    user_interactions:
      - See red error box appear with "Error:" prefix
      - See specific error message text
    api_calls: []
    auth_required: false

  - name: Summary Metrics Bar
    description: Three stat cards showing counts after analysis completes
    files:
      - src/app/_components/AnalyzerForm.tsx
    entry_route: /
    user_interactions:
      - See "Ownership nodes" card with numeric value
      - See "Author articles" card with numeric value
      - See "Active alerts" card with numeric value
    api_calls: []
    auth_required: false

  - name: Layer 1 — Ownership Chain Panel
    description: Shows domain, title, ownership chain, summary, and optional MBFC badges
    files:
      - src/app/_components/AnalyzerForm.tsx
    entry_route: /
    user_interactions:
      - See "Layer 1" tag and "Media Outlet" heading
      - See Domain field with value
      - See Title field with article title
      - See Ownership chain field (arrow-separated or "Not found")
      - See Summary field
      - See MBFC badges if available (Bias, Factual, Credibility)
    api_calls: []
    auth_required: false

  - name: Layer 2 — Author Panel
    description: Shows author name, biography, coverage pattern, and article list
    files:
      - src/app/_components/AnalyzerForm.tsx
    entry_route: /
    user_interactions:
      - See "Layer 2" tag and "Author" heading
      - See Author field
      - See Biography field if present
      - See Coverage pattern field
      - See articles list with source labels and clickable links
    api_calls: []
    auth_required: false

  - name: Layer 2.5 — Author Coverage Map
    description: Collapsible topic tree with branch expand/collapse and bar chart
    files:
      - src/app/_components/AnalyzerForm.tsx
    entry_route: /
    user_interactions:
      - See "Layer 2.5" tag and "Author Coverage Map" heading
      - See author name root node
      - See topic branches with article count badges
      - Click a topic branch to expand it and reveal article links
      - Click the same branch again to collapse it
      - See bar chart with topic distribution on the right
    api_calls: []
    auth_required: false

  - name: Layer 3 — Contrast Analysis Panel
    description: AI-generated contrast paragraph
    files:
      - src/app/_components/AnalyzerForm.tsx
    entry_route: /
    user_interactions:
      - See "Layer 3" tag and "Contrast" heading
      - See contrast analysis paragraph text
    api_calls: []
    auth_required: false

  - name: Layer 4 — Narrative Divergence Panel
    description: Score, progress bar, interpretation, and divergent sources list
    files:
      - src/app/_components/AnalyzerForm.tsx
    entry_route: /
    user_interactions:
      - See "Layer 4" tag and "Narrative Divergence" heading
      - See numeric score or "Not available" message
      - See color-coded progress bar
      - See interpretation text
      - See global and author snippet counts
      - See list of most divergent sources with score badges and links
    api_calls: []
    auth_required: false

  - name: Layer 5 — Bias Alerts Panel
    description: Alert list with HIGH/MEDIUM/LOW severity badges
    files:
      - src/app/_components/AnalyzerForm.tsx
    entry_route: /
    user_interactions:
      - See "Alerts" tag and "Bias Alerts Detected" heading
      - See each alert with a colored severity badge (HIGH/MEDIUM/LOW)
      - See alert code text
      - See alert message text
    api_calls: []
    auth_required: false

  - name: Raw JSON Inspector
    description: Collapsible details element with full JSON response
    files:
      - src/app/_components/AnalyzerForm.tsx
    entry_route: /
    user_interactions:
      - See "Raw JSON" summary text collapsed by default
      - Click to expand and see JSON in scrollable pre block
      - Click again to collapse
    api_calls: []
    auth_required: false

  - name: Header and Footer
    description: Sticky header with HUGINN branding and footer with GitHub and X links
    files:
      - src/app/_components/AnalyzerForm.tsx
    entry_route: /
    user_interactions:
      - See HUGINN title and subtitle in sticky header
      - See "Live Analysis" badge in header
      - See footer with copyright text
      - See GitHub link in footer
      - See X / Twitter link in footer
    api_calls: []
    auth_required: false

known_limitations:
  - issue: MBFC badges only appear when MBFC_API_KEY is set and domain is indexed
    location: src/lib/mbfc.ts
    impact: Layer 1 shows no MBFC badges for unlisted outlets or missing key
  - issue: Divergence score shows "Not available" when GOOGLE_AI_API_KEY is missing
    location: src/lib/embeddings.ts
    impact: Layer 4 score section is replaced with a plain text message
  - issue: Analysis takes 10-30 seconds with no streaming
    location: src/app/api/analyze/route.ts
    impact: User sees spinner until all external calls complete
